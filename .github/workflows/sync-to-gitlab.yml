name: Sync main to GitLab ai/default

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_REPO: lab.ssafy.com/s14-final/S14P31A309.git
          TARGET_BRANCH: ai/default
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@${GITLAB_REPO}"

          git fetch gitlab refs/heads/${TARGET_BRANCH}:refs/remotes/gitlab/${TARGET_BRANCH} || true

          git push --force-with-lease=refs/heads/${TARGET_BRANCH} gitlab HEAD:refs/heads/${TARGET_BRANCH}